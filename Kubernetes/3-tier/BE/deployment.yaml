apiVersion: apps/v1
kind: Deployment
metadata:
  name: studentapp
  namespace: k8s
  labels:
    app: studentapp
spec:
   replicas: 3
  selector:
    matchLabels:
      app: studentapp
      
  template:
    metadata:
      labels:
        app: studentapp
    spec:
      containers:
        - name: studentapp-container
          image: andyas2501/k8s-backend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 400m
              memory: 400Mi

